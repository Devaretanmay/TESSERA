system: "e2e_test_agent"
version: "1.0.0"
nodes:
  - id: user_input
    type: llm
    trust_boundary: user_controlled
  - id: knowledge_base
    type: rag_corpus
    trust_boundary: partially_trusted
  - id: database_tool
    type: tool
    trust_boundary: internal
  - id: email_service
    type: tool
    trust_boundary: internal
edges:
  - from: user_input
    to: knowledge_base
    flow: retrieval
  - from: user_input
    to: database_tool
    flow: tool_call
  - from: user_input
    to: email_service
    flow: tool_call