# TESSERA Security Scan Workflow
# 
# This workflow runs TESSERA security scans on YAML topology files.
# Results are uploaded to GitHub Code Scanning.
#
# Configuration options:
#   - fail-on-severity: Severity level to fail on (critical, high, medium, low)
#   - scan-paths: Paths to scan (default: examples/)
#
# For SARIF output, results appear in GitHub Security tab under "Code Scanning".

name: TESSERA Security Scan

on:
  push:
    branches: [main]
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.github/workflows/tessera.yml'
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.github/workflows/tessera.yml'
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan

jobs:
  tessera-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install TESSERA
        run: |
          pip install tessera-security
      
      - name: Run TESSERA scan
        continue-on-error: true
        run: |
          # Scan all YAML files and output SARIF
          find . -name "*.yaml" -type f | head -20 | while read file; do
            echo "Scanning: $file"
            tessera scan "$file" --format sarif --output "$(basename $file .yaml).sarif" || true
          done
          
          # Also try to scan examples directory
          if [ -d "examples" ]; then
            tessera scan-dir examples/ --format sarif --output results.sarif || true
          fi
      
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: |
            results.sarif
            examples/*.sarif
          category: tessera
      
      - name: Show summary
        run: |
          echo "TESSERA scan complete"
          echo ""
          echo "Results uploaded to GitHub Security tab"
          echo ""
          echo "To view results:"
          echo "1. Go to your repository on GitHub"
          echo "2. Click the 'Security' tab"
          echo "3. Click 'Code scanning'"
          echo "4. View TESSERA findings"