version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TESSERA_REDIS_HOST=redis
      - TESSERA_REDIS_PORT=6379
      - TESSERA_DB_HOST=postgres
      - TESSERA_DB_PORT=5432
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=tessera
      - POSTGRES_PASSWORD=tessera
      - POSTGRES_DB=tessera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: