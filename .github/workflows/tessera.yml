# TESSERA Security Scan Workflow
# 
# This workflow runs TESSERA security scans on YAML topology files.
# Results are uploaded to GitHub Code Scanning.
#
# For SARIF output, results appear in GitHub Security tab under "Code Scanning".

name: TESSERA Security Scan

on:
  push:
    branches: [main]
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.github/workflows/tessera.yml'
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.github/workflows/tessera.yml'
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan

jobs:
  tessera-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install TESSERA
        run: pip install tessera-security
      
      - name: Run TESSERA scan
        run: |
          # Scan examples directory
          tessera scan --config examples/complex_agent.yaml --format sarif --output results.sarif
      
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: tessera
      
      - name: Show summary
        run: |
          echo "TESSERA scan complete"
          echo ""
          echo "Results uploaded to GitHub Security tab"
