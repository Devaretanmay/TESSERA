name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,api]"

      - name: Ruff
        run: python -m ruff check src tests

      - name: Pytest
        run: python -m pytest -q

  package-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,api]"

      - name: Build distributions
        run: python -m build

      - name: Verify metadata
        run: python -m twine check dist/*

      - name: Smoke install built wheel
        run: |
          python -m venv /tmp/tessera-wheel-venv
          /tmp/tessera-wheel-venv/bin/python -m pip install --upgrade pip
          /tmp/tessera-wheel-venv/bin/python -m pip install dist/*.whl
          /tmp/tessera-wheel-venv/bin/tessera version
          /tmp/tessera-wheel-venv/bin/tessera scan --config examples/safe_agent.yaml --format json

  security-audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,api]"

      - name: Dependency audit
        run: python -m pip_audit
