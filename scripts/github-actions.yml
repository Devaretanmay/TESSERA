# TESSERA CI/CD Security Scan
name: TESSERA Security Scan

on:
  pull_request:
    paths:
      - 'prompts/**'
      - 'config/**'
      - '**/topology.yaml'
    branches: [main, develop]
  push:
    paths:
      - 'prompts/**'
      - 'config/**'
      - '**/topology.yaml'
    branches: [main, develop]
  workflow_dispatch:

jobs:
  tessera-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install TESSERA
        run: |
          pip install tessera-ai
          
      - name: Run Tier 1 Scan
        run: |
          tessera scan --config topology.yaml --tier 1
        continue-on-error: true
        id: scan
        
      - name: Parse Results
        run: |
          if [ -f "findings.json" ]; then
            echo "Findings exported"
            cat findings.json
          fi
          
      - name: Check Exit Code
        if: ${{ always() }}
        run: |
          echo "Scan exit code: ${{ hashFiles('**') }}"
          echo "Status: completed"
          
      - name: Upload SARIF Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tessera-results
          path: findings.sarif
          retention-days: 30