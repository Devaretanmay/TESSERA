name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,api]"

      - name: Build distributions
        run: python -m build

      - name: Verify metadata
        run: python -m twine check dist/*

      - name: Smoke install built wheel
        run: |
          python -m venv /tmp/tessera-release-venv
          /tmp/tessera-release-venv/bin/python -m pip install --upgrade pip
          /tmp/tessera-release-venv/bin/python -m pip install dist/*.whl
          /tmp/tessera-release-venv/bin/tessera version
          /tmp/tessera-release-venv/bin/tessera scan --config examples/safe_agent.yaml --format json

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist
          output-file: tessera.spdx.json
          format: spdx-json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tessera-release-artifacts
          path: |
            dist/*
            tessera.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*
            tessera.spdx.json

      - name: Publish prerelease to TestPyPI
        if: contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish release to PyPI
        if: ${{ !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') && !contains(github.ref_name, 'rc') }}
        uses: pypa/gh-action-pypi-publish@release/v1
