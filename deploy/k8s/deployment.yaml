apiVersion: v1
kind: Namespace
metadata:
  name: tessera
---
apiVersion: v1
kind: Secret
metadata:
  name: tessera-secrets
  namespace: tessera
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:password@postgres:5432/tessera"
  REDIS_URL: "redis://redis:6379"
  API_KEY: "change-me-in-production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tessera-api
  namespace: tessera
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tessera-api
  template:
    metadata:
      labels:
        app: tessera-api
    spec:
      containers:
      - name: api
        image: tessera:latest
        command: ["python", "-m", "tessera.api.server"]
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tessera-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: tessera-secrets
              key: REDIS_URL
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: tessera-secrets
              key: API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tessera-api
  namespace: tessera
spec:
  selector:
    app: tessera-api
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tessera-worker
  namespace: tessera
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tessera-worker
  template:
    metadata:
      labels:
        app: tessera-worker
    spec:
      containers:
      - name: worker
        image: tessera:latest
        command: ["python", "-m", "tessera.swarm.engine"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tessera-secrets
              key: DATABASE_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: tessera-worker
  namespace: tessera
spec:
  selector:
    app: tessera-worker
  ports:
  - port: 9000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tessera-ingress
  namespace: tessera
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
  - host: tessera.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tessera-api
            port:
              number: 80
  tls:
  - hosts:
    - tessera.example.com
    secretName: tessera-tls
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tessera-data
  namespace: tessera
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi