system: "memory_agent"
version: "1.0.0"
nodes:
  - id: user_input
    type: llm
    trust_boundary: user_controlled
  - id: memory
    type: memory_store
    trust_boundary: internal
  - id: api
    type: tool
    trust_boundary: internal
edges:
  - from: user_input
    to: memory
    flow: read_write
  - from: memory
    to: api
    flow: tool_call
